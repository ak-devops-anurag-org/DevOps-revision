apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod-with-cm
  labels:
    app: busybox
spec:
  containers:
  - name: busybox-container
    image: busybox
    env:
    - name: DATABASE_URL
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: DATABASE_URL
    - name: API_KEY
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: API_KEY
    command: ["sleep", "3600"]  # Keeps container running for 1 hour
  restartPolicy: Never
