apiVersion: v1
kind: ConfigMap
metadata:
  name: file-config
data:
  # Configuration file content
  nginx.conf: |
    server {
        listen 80;
        server_name ak@c.com;
        
        location / {
            proxy_pass http://backend;
        }
    }
  
  app.properties: |
    database.host=localhost
    database.port=5432
    database.name=myapp
    
  config.json: |
    {
      "api": {
        "version": "v1",
        "timeout": 30
      },
      "features": {
        "authentication": true,
        "caching": false
      }
    }