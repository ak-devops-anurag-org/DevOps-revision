apiVersion: v1
kind: LimitRange
metadata:
  name: memory-limit-range
  namespace: your-namespace-name  # Replace with your namespace
spec:
  limits:
  - type: Container
    default:
      memory: "512Mi"
    defaultRequest:
      memory: "256Mi"
    min:
      memory: "128Mi"
    max:
      memory: "1Gi"
