apiVersion: v1
kind: Service
metadata:
  name: my-loadbalancer-service
  labels:
    app: my-app
spec:
  type: LoadBalancer
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
      # Optional: You can specify a different port for the external load balancer
      # nodePort: 30000
