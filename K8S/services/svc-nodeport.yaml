apiVersion: v1
kind: Service
metadata:
  name: nginx-service               # Name of the Service
  labels:
    app: svc-noteport               # Labels help group and select Kubernetes resources
    env: dev                        # Environment label for dev environment
spec:
  type: NodePort                    # Exposes the service on each Node’s IP at a static port (nodePort)
  ports:
    - name: http                    # Optional: name of the port (useful for readability)
      port: 80                      # Service port (used inside the cluster)
      targetPort: 80                # Port on the pod/container that receives the traffic
      nodePort: 30001               # External port exposed on the host/node (accessible via browser)
      # protocol: TCP               # Optional: defaults to TCP
  selector:
    run: nginx-pod                  # This service will route traffic to pods with these labels
    env: dev                        # Ensures it only targets the correct pods in the dev environment





